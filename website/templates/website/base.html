{% load static %}

<!DOCTYPE html>
<html lang="en">
    
<!----------------------------------------------------->
<!-- HEADER -->

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="{% static 'website/css/base.css' %}">

        {% block extra_css %}{% endblock %}

        <title>{% block title %}Pasnevesht{% endblock %}</title>

    </head>

    <body>

        <header>
            <div class="logo">Pasnevesht</div>

            <nav class="nav-links">
                <a href="{% url 'website:home' %}">Home</a>
                <a href="{% url 'website:home' %}#howitworks">How It Works</a>
                <a href="{% url 'website:home' %}#features">Features</a>
                <a href="{% url 'blog:home' %}">Blog</a>
                <a href="{% url 'website:about_us' %}">About Us</a>
            </nav>

            <div class="auth">
                <a href="{% url 'website:login' %}" class="login">Log In</a>
                <a href="{% url 'website:signup' %}" class="signup">Sign Up</a>
            </div>
        </header>

<!----------------------------------------------------->
<!-- BODY -->
        {% block content %}
        {% endblock %}

<!----------------------------------------------------->
<!-- FOOTER -->

        <footer class="site-footer">
            <div class="footer-container">

                <div class="footer-left">
                    © 2026 Pasnevesht — Built with love by vasi
                </div>

                <div class="footer-right">
                    <a href="{% url 'website:about_us' %}">About Us</a>
                    <a href="{% url 'website:about_us' %}#contact_us">Contact Us</a>
                    <a href="{% url 'website:tos' %}">Terms Of Services</a>
                    <a href="{% url 'website:privacy' %}">Privacy Policy</a>
                </div>

            </div>
        </footer>
    </body>

</html>
